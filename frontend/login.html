<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Gestión Ganadera</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../recursos/css/style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <a href="../index.html" class="auth-logo">Gestion<span>Ganadera</span></a>

    <h1 class="auth-title">Bienvenido</h1>
    <p class="auth-subtitle">Ingresa tus datos para acceder a tu cuenta</p>

    <div id="error-msg"></div>
    <div id="success-msg"></div>

    <div class="auth-field">
      <label for="correo">Correo electrónico</label>
      <input type="email" id="correo" placeholder="tucorreo@email.com">
    </div>

    <div class="auth-field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="auth-btn" onclick="iniciarSesion()">Iniciar sesión</button>

    <hr class="auth-divider">

    <div class="auth-footer">
      <p>¿No tienes cuenta?</p>
      <a href="registro.html" class="link-login">Regístrate</a>
      <span class="separador">|</span>
      <a href="../index.html" class="link-home">Volver al inicio</a>
    </div>

  </div>
</div>

<script>
const errorMsg = document.getElementById('error-msg');
const successMsg = document.getElementById('success-msg');

function mostrarError(msg) {
    successMsg.style.display = 'none';
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
}

function mostrarExito(msg) {
    errorMsg.style.display = 'none';
    successMsg.textContent = msg;
    successMsg.style.display = 'block';
}

async function iniciarSesion() {
    const correo = document.getElementById('correo').value;
    const password = document.getElementById('password').value;

    if (!correo || !password) return mostrarError('Por favor, completa todos los campos.');

    try {
        const respuesta = await fetch('http://localhost:3000/api/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'clave-ganadera': 'FincaSecreta123'
            },
            body: JSON.stringify({ correo, password })
        });

        const resultado = await respuesta.json();

    if (respuesta.ok) {
    mostrarExito('✓ ¡Bienvenido! Redirigiendo al panel...');
    localStorage.setItem('usuario', JSON.stringify(resultado.usuario));
    
    setTimeout(() => {
        window.location.href = '../paginas/panel-principal.html';
    }, 500);

} else {
    mostrarError(resultado.mensaje || 'Credenciales incorrectas.');
}

    } catch (error) {
        mostrarError('No se pudo conectar con el servidor. ¿Está encendido?');
    }
}
</script>
</body>
</html>
