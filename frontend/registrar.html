<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Gestión Ganadera</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../recursos/css/style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <a href="../index.html" class="auth-logo">Gestion<span>Ganadera</span></a>

    <h1 class="auth-title">Crea tu cuenta</h1>
    <p class="auth-subtitle">Empieza a gestionar tu finca en minutos</p>

    <div id="error-msg"></div>
    <div id="success-msg" style="display: none;">✓ Cuenta creada con éxito. Redirigiendo...</div>

    <div class="auth-field">
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" placeholder="Nombre">
    </div>

    <div class="auth-field">
      <label for="correo">Correo electrónico</label>
      <input type="email" id="correo" placeholder="Correo">
    </div>

    <div class="auth-field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Contraseña">
    </div>

    <div class="auth-field">
      <label for="password2">Confirmar contraseña</label>
      <input type="password" id="password2" placeholder="Confirmar contraseña">
    </div>

    <button class="auth-btn" onclick="registrar()">Crear cuenta</button>

    <div class="auth-footer">
      <p>¿Ya tienes una cuenta?</p>
      <a href="../index.html" class="link-home">Volver al inicio</a>
      <span class="separador">|</span>
      <a href="login.html" class="link-login">Iniciar sesión</a>
    </div>

  </div>
</div>

<script>
const errorMsg = document.getElementById('error-msg');
const successMsg = document.getElementById('success-msg');

function mostrarError(msg) {
    successMsg.style.display = 'none';
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
}

async function registrar() {
    const nombre = document.getElementById('nombre').value;
    const correo = document.getElementById('correo').value;
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;

    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';

    if (!nombre || !correo || !password || !password2) return mostrarError('Por favor, llena todos los campos.');
    if (password !== password2) return mostrarError('Las contraseñas no coinciden.');

    try {
        const respuesta = await fetch('http://localhost:3000/api/registrar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nombre, correo, password })
        });

        const resultado = await respuesta.json();

        if (respuesta.ok) {
            successMsg.style.display = 'block';
            setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
            mostrarError(resultado.mensaje || 'Error al registrar el usuario.');
        }

    } catch (error) {
        mostrarError('No se pudo conectar con el servidor. ¿Está encendido?');
    }
}
</script>
</body>
</html>
