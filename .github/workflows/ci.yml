name: Validacion Landing Page

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  validar:

    runs-on: ubuntu-latest

    steps:

      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Verificar index.html
        run: test -f frontend/index.html

      - name: Verificar style.css
        run: test -f frontend/css/style.css

      - name: Verificar script.js
        run: test -f frontend/js/script.js

      - name: Verificar README.md
        run: test -f README.md